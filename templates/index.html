<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churn Prediction</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Card Container */
        .form-container {
            background-color: #1e1e24;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #2a2a32;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #00adb5;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Form Layout */
        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #a8a8b3;
            font-weight: 500;
        }

        /* Inputs and Selects */
        input[type="number"],
        select {
            background-color: #2a2a32;
            color: #ffffff;
            border: 2px solid #3e3e4a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
        }

        input[type="number"]:focus,
        select:focus {
            border-color: #00adb5;
            box-shadow: 0 0 8px rgba(0, 173, 181, 0.4);
        }

        /* Placeholder Color */
        ::placeholder {
            color: #666673;
            opacity: 1;
        }

        /* Custom styling for select arrow in some browsers */
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%23a8a8b3'><polygon points='0,0 10,0 5,5'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 32px;
        }

        /* Submit Button */
        input[type="submit"] {
            background-color: #00adb5;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            background-color: #008f95;
        }

        input[type="submit"]:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Churn Prediction</h2>
        
        <form action="/predict" method="POST">
            <label for="tenure">Tenure (Months)</label>
            <input type="number" name="tenure" id="tenure" placeholder="e.g., 23" required min="0">

            <label for="monthlyCharges">Monthly Charges ($)</label>
            <input type="number" name="monthlyCharges" id="monthlyCharges" placeholder="e.g., 45" required min="0" step="any">

            <label for="Contract">Contract Type</label>
            <select name="Contract" id="Contract">
                <option value="Month-to-month">Month-to-month</option>
                <option value="One year">One year</option>
                <option value="Two year">Two year</option>
            </select>

            <label for="InternetService">Internet Service</label>
            <select name="InternetService" id="InternetService">
                <option value="DSL">DSL</option>
                <option value="Fiber optic">Fiber optic</option>
                <option value="No">No</option>
            </select>

            <label for="TotalCharges">Total Charges ($)</label>
            <input type="number" name="TotalCharges" id="TotalCharges" placeholder="e.g., 56" required min="0" step="any">

            <input type="submit" value="Predict Churn">
        </form>
    </div>

</body>
</html>
